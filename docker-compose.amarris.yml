services:
  mongo:
    image: mongo
    container_name: mongo
    restart: always
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8088:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin@mongo:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

  kibana:
    image: kibana:8.12.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200

  smartledger:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartledger
    ports:
      - "8086:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://admin:admin@mongo:27017/smartledger?authSource=admin
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
    depends_on:
      - mongo
      - elasticsearch

  frontend:
    build:
      context: ./amarris_ng 
      dockerfile: Dockerfile.angular
    container_name: smartledger-frontend
    ports:
      - "4200:80"
    depends_on:
      - smartledger