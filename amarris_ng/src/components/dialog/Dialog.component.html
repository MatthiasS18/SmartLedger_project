  <h2 mat-dialog-title>{{ data.title }}</h2>
  <mat-dialog-content>
    <div class="grid grid-cols-2 gap-6">
      @for (field of data.fields; track field.key) {
        <div class="rounded-t-lg">
          <mat-form-field>
            <mat-label>{{ field.label }}</mat-label>

            @if (field.type === 'select') {
                <mat-select [(ngModel)]="field.value">
                    @for (option of field.options; track option) {
                    <mat-option [value]="option">{{ option }}</mat-option>
                    }
                </mat-select>
            } @else if (field.type === 'number') {
              <input matInput type="number" min="0" [(ngModel)]="field.value" />
            }
            @else if (field.type === 'date') {
                <input matInput [matDatepicker]="picker" [(ngModel)]="field.value">
                <mat-hint>MM/DD/YYYY</mat-hint>
                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
            } @else {
                <input matInput [(ngModel)]="field.value" />
            }
          </mat-form-field>
        </div>
      }
    </div>
  </mat-dialog-content>
  <mat-dialog-actions class="grid grid-cols-2 gap-4">
    <button mat-button (click)="onCancel()">Cancel</button>
    <button mat-button (click)="onConfirm()">Confirm</button>
  </mat-dialog-actions>
